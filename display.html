<!doctype html>
<html>
  <head>
    <title>ImpView Display</title>

    <link rel="stylesheet" href="/src/styles/display.scss" />

    <script type="module" src="/src/display/main.js"></script>
  </head>

  <body>
    <div id="loader">ImpView is loading...</div>

    <div id="activation-overlay">
      <div>
        <div id="activation-title">Click anywhere to activate display</div>
        <div id="activation-subtitle">(required for audio / video playback)</div>
      </div>
    </div>

    <div class="content">
      <div class="center video">
        <video id="video" style="display: none"></video>
      </div>
    </div>

    <div class="content">
      <div class="center img">
        <div id="image" style="display: none"></div>
      </div>
    </div>

    <div class="content">
      <div class="center img">
        <!-- normalized from malformed </img> in original -->
        <span id="i" style="display: none"></span>
      </div>
    </div>

    <div class="content">
      <div>
        <div id="credits" style="display: none"></div>
      </div>
    </div>

    <div class="content">
      <div class="center">
        <div id="text" style="display: none"></div>
      </div>
    </div>

    <div class="content">
      <div class="center">
        <!-- Wrapper owns the show/hide fade so the .alphabet itself never has
                    a transition running on it — Firefox flattens 3D subtrees during
                    transitions and would "snap" into the ring at the end otherwise. -->
        <div id="alphabet-wrap" class="initial animate">
          <ul id="alphabet" class="alphabet">
            <li>A</li>
            <li>B</li>
            <li>C</li>
            <li>D</li>
            <li>E</li>
            <li>F</li>
            <li>G</li>
            <li>H</li>
            <li>I</li>
            <li>J</li>
            <li>K</li>
            <li>L</li>
            <li>M</li>
            <li>N</li>
            <li>O</li>
            <li>P</li>
            <li>Q</li>
            <li>R</li>
            <li>S</li>
            <li>T</li>
            <li>U</li>
            <li>V</li>
            <li>W</li>
            <li>X</li>
            <li>Y</li>
            <li>Z</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
